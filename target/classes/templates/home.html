<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'GamerSupplies | ' + ${pageTitle}">GamerSupplies | Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Main Glass Card -->
                <div class="card border-0 shadow-lg text-center p-4 p-md-5">
                    <div class="card-body">
                        
                        <!-- Gradient Title -->
                        <h1 class="fw-bold display-5 mb-3 pb-2" style="background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">
                            Leveling Up Gaming Setups
                        </h1>
                        
                        <p class="lead text-muted mb-4 fs-5">
                            GamerSupplies is your ultimate destination for consoles, accessories, and games.
                        </p>
                        
                        <a th:href="@{/categories}" class="btn btn-primary btn-lg mt-3 px-5 rounded-pill shadow w-100 p-3">
                            Browse Categories
                        </a>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="mt-auto py-4">
    <div class="container text-center text-muted">
        <p class="mb-0">&copy; 2026 GamerSupplies | Star Mode Studios</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
