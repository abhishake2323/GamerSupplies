<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">GamerSupplies</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">

            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">Products</a></li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','STAFF')">
                    <a class="nav-link" th:href="@{/products/add}">+ Add Product</a>
                </li>

            </ul>

            <div class="d-flex align-items-center gap-2">

                <span class="text-light small" sec:authorize="isAuthenticated()">
                    Signed in as <strong sec:authentication="name"></strong>
                    (<span sec:authentication="principal.role"></span>)
                </span>

                <a class="btn btn-outline-light btn-sm"
                   sec:authorize="!isAuthenticated()"
                   th:href="@{/login}">Login</a>

                <a class="btn btn-warning btn-sm"
                   sec:authorize="!isAuthenticated()"
                   th:href="@{/register}">Register</a>

                <form sec:authorize="isAuthenticated()"
                      th:action="@{/logout}" method="post" class="m-0">
                    <button class="btn btn-danger btn-sm" type="submit">Logout</button>
                </form>

            </div>

        </div>
    </div>
</nav>
</body>
</html>
