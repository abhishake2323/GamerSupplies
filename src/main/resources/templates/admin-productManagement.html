<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Management for Admin | GamerSupplies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navigation :: navbar"></div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1">Product Management for Admin</h1>
            <p class="text-muted mb-0">The admins can edit and delete the products here.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/products/add}">Add Product</a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>SKU</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.category}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}"></td>
                    <td th:text="${product.quantity}"></td>
                    <td th:text="${product.sku}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{|/products/admin/edit/${product.id}|}">Edit Product</a>
                        <form th:action="@{|/products/admin/delete/${product.id}|}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-outline-danger" type="submit"
                                    onclick="return confirm('Delete this product?');">Delete Product</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6" class="text-center py-4">No products are found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
