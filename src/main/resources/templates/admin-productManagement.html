<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'GamerSupplies | ' + ${pageTitle}">GamerSupplies | Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="py-5 flex-grow-1">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-1 text-warning">Product Management</h1>
                <p class="text-muted mb-0 fs-5 mt-2">Admins can edit and delete products here.</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/products/add}" class="btn btn-primary">+ Add Product</a>
                <a th:href="@{/admin}" class="btn btn-outline-secondary">← Admin Panel</a>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(products)}" class="card shadow-sm border-0 text-center py-5">
            <div class="card-body">
                <p class="text-muted fs-5 mb-3">No products in the system yet.</p>
                <a th:href="@{/products/add}" class="btn btn-warning">Add Your First Product</a>
            </div>
        </div>

        <!-- Products table -->
        <div th:unless="${#lists.isEmpty(products)}" class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>SKU</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product, stat : ${products}">
                            <td class="text-muted" th:text="${stat.count}">1</td>
                            <td class="fw-semibold" th:text="${product.name}">Name</td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${product.category == 'Consoles'} ? 'bg-primary' :
                                                     (${product.category == 'Accessories'} ? 'bg-success' : 'bg-warning text-dark')"
                                      th:text="${product.category}">Category</span>
                            </td>
                            <td th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                            <td th:text="${product.quantity}">0</td>
                            <td><code th:text="${product.sku}">SKU</code></td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/edit/{id}(id=${product.id})}">Edit</a>
                                <form th:action="@{/admin/delete/{id}(id=${product.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this product?');">
                                    <button class="btn btn-sm btn-outline-danger ms-1" type="submit">Delete</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0 text-muted">&copy; 2026 GamerSupplies | Star Mode Studios</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
