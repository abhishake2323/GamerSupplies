<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'GamerSupplies | ' + ${pageTitle}">GamerSupplies | Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="py-5">
    <section class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="mb-5 text-center">
                    <h1 class="fw-bold mb-2 text-gradient" style="background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" class="bi bi-controller me-2 mb-1 text-primary" viewBox="0 0 16 16">
                          <path d="M11.5 6.027a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm-1.5 1.5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1zm2.5-.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm-1.5 1.5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1zm-6.5-3h1v1h1v1h-1v1h-1v-1h-1v-1h1v-1z"/>
                          <path d="M3.051 3.26a.5.5 0 0 1 .354-.613l1.932-.518a.5.5 0 0 1 .62.39c.655-.079 1.35-.117 2.043-.117.72 0 1.443.041 2.12.126a.5.5 0 0 1 .622-.399l1.932.518a.5.5 0 0 1 .306.729c.14.09.266.19.373.297.408.408.78 1.05 1.068 1.777.238.596.406 1.206.523 1.79.117.584.153 1.168.106 1.731-.047.563-.162 1.114-.345 1.637-.183.523-.427 1-.72 1.415-.294.414-.64.764-1.033 1.042-.394.278-.838.487-1.32.613-.481.126-.998.176-1.543.15-.544-.027-1.12-.132-1.727-.308A12.7 12.7 0 0 1 8 13.98a12.7 12.7 0 0 1-2.924-.653c-.608.176-1.183.281-1.727.308-.545.026-1.062-.024-1.543-.15-.482-.126-.926-.335-1.32-.613-.393-.278-.739-.628-1.033-1.042-.293-.415-.537-.892-.72-1.415-.183-.523-.298-1.074-.345-1.637-.047-.563-.011-1.147.106-1.731.117-.584.285-1.194.523-1.79.288-.727.66-1.37 1.068-1.777a2.5 2.5 0 0 1 .373-.297A2.2 2.2 0 0 1 3.051 3.26z"/>
                        </svg>
                        Add New Gear
                    </h1>
                    <p class="text-muted fs-5">Expand your inventory with high-performance products.</p>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">

                        <form th:action="@{/admin/add}"
                              th:object="${product}"
                              method="post"
                              novalidate>

                            <div class="mb-3">
                                <label for="name" class="form-label fw-semibold">
                                    Product Name <span class="text-danger">*</span>
                                </label>
                                <input type="text"
                                       id="name"
                                       th:field="*{name}"
                                       th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''"
                                       class="form-control"
                                       placeholder="e.g. PlayStation 5 Controller"
                                       maxlength="100">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('name')}"
                                     th:errors="*{name}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="sku" class="form-label fw-semibold">
                                    SKU <span class="text-danger">*</span>
                                </label>
                                <input type="text"
                                       id="sku"
                                       th:field="*{sku}"
                                       th:classappend="${#fields.hasErrors('sku')} ? ' is-invalid' : ''"
                                       class="form-control"
                                       placeholder="e.g. CTRL-PS5-WHT"
                                       maxlength="50">
                                <div class="form-text">Unique product code used to identify this item.</div>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('sku')}"
                                     th:errors="*{sku}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label fw-semibold">
                                    Category <span class="text-danger">*</span>
                                </label>
                                <select id="category"
                                        th:field="*{category}"
                                        th:classappend="${#fields.hasErrors('category')} ? ' is-invalid' : ''"
                                        class="form-select">
                                    <option value="">— Select a category —</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat}"
                                            th:text="${cat}"></option>
                                </select>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('category')}"
                                     th:errors="*{category}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label fw-semibold">
                                    Description <span class="text-danger">*</span>
                                </label>
                                <textarea id="description"
                                          th:field="*{description}"
                                          th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"
                                          class="form-control"
                                          rows="3"
                                          placeholder="Describe the product..."
                                          maxlength="500"></textarea>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('description')}"
                                     th:errors="*{description}"></div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-sm-6">
                                    <label for="price" class="form-label fw-semibold">
                                        Price ($) <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group shadow-sm rounded-3">
                                        <span class="input-group-text border-end-0 bg-transparent text-primary fw-bold">$</span>
                                        <input type="number"
                                               id="price"
                                               th:field="*{price}"
                                               th:classappend="${#fields.hasErrors('price')} ? ' is-invalid' : ''"
                                               class="form-control"
                                               placeholder="0.00"
                                               step="0.01"
                                               min="0.01"
                                               max="9999.99">
                                        <div class="invalid-feedback"
                                             th:if="${#fields.hasErrors('price')}"
                                             th:errors="*{price}"></div>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <label for="quantity" class="form-label fw-semibold">
                                        Quantity <span class="text-danger">*</span>
                                    </label>
                                    <input type="number"
                                           id="quantity"
                                           th:field="*{quantity}"
                                           th:classappend="${#fields.hasErrors('quantity')} ? ' is-invalid' : ''"
                                           class="form-control"
                                           placeholder="0"
                                           min="0"
                                           max="9999">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('quantity')}"
                                         th:errors="*{quantity}"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="imageUrl" class="form-label fw-semibold">
                                    Image URL
                                </label>
                                <input type="text"
                                       id="imageUrl"
                                       th:field="*{imageUrl}"
                                       th:classappend="${#fields.hasErrors('imageUrl')} ? ' is-invalid' : ''"
                                       class="form-control"
                                       placeholder="https://example.com/product-image.jpg"
                                       maxlength="500">
                                <div class="form-text">Optional product image link.</div>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('imageUrl')}"
                                     th:errors="*{imageUrl}"></div>
                            </div>

                            <div class="d-flex gap-3 mt-5 pt-3 border-top border-secondary border-opacity-25">
                                <button type="submit" class="btn btn-primary px-5 py-2 fs-5 w-100">
                                    Initialize Product
                                </button>
                                <a th:href="@{/admin}" class="btn btn-outline-secondary px-5 py-2 fs-5 w-100">
                                    Abort
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

                <p class="text-muted mt-3 small">
                    <span class="text-danger">*</span> Required fields
                </p>

            </div>
        </div>
    </section>
</main>

<footer class="py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-0 text-muted">&copy; 2026 GamerSupplies | Star Mode Studios</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
