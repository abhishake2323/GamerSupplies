<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GamerSupplies | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card border-0 shadow-lg p-4 p-md-5">
                    <div class="card-body">
                        <h1 class="h3 mb-2 text-center fw-bold">Sign In</h1>
                        <p class="text-muted text-center mb-4">Access your GamerSupplies account.</p>

                        <div class="alert alert-success" th:if="${param.registered}">
                            Your account has been created. Please log in.
                        </div>
                        <div class="alert alert-danger" th:if="${param.error}">
                            Incorrect username or password. Please try again.
                        </div>
                        <div class="alert alert-info" th:if="${param.logout}">
                            You have been logged out successfully.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Username</label>
                                <input id="username" name="username" type="text" class="form-control" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input id="password" name="password" type="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                        </form>

                        <p class="text-center mt-4 mb-0">
                            Need an account? <a th:href="@{/register}">Register here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="mt-auto py-4">
    <div class="container text-center text-muted">
        <p class="mb-0">&copy; 2026 GamerSupplies | Star Mode Studios</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
