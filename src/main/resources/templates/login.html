<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | GamerSupplies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Main Glass Card -->
                <div class="card border-0 shadow-lg text-center p-4 p-md-5">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3 text-center">Sign In</h1>
                    <p class="text-muted text-center">Access your GamerSupplies account.</p>

                    <div class="alert alert-success" th:if="${param.registered}">
                        Your account has been created successfully. Please log in.
                    </div>

                    <div class="alert alert-danger" th:if="${param.error}">
                        Incorrect username or password. Please try again.
                    </div>

                    <div class="alert alert-info" th:if="${param.logout}">
                        Logged out successfully.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" name="username" type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Need an account?
                        <a th:href="@{/register}">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</main>

<footer class="mt-auto py-4">
    <div class="container text-center text-muted">
        <p class="mb-0">&copy; 2026 GamerSupplies | Star Mode Studios</p>
    </div>
</footer>

</body>
</html>
