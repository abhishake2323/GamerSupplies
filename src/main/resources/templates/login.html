<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | GamerSupplies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navigation :: navbar"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3 text-center">Sign In</h1>
                    <p class="text-muted text-center">Access your GamerSupplies account.</p>

                    <div class="alert alert-success" th:if="${param.registered}">
                        Your account has been created successfully. Please log in.
                    </div>

                    <div class="alert alert-danger" th:if="${param.error}">
                        Incorrect username or password. Please try again.
                    </div>

                    <div class="alert alert-info" th:if="${param.logout}">
                        Logged out successfully.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" name="username" type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100">Login</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Need an account?
                        <a th:href="@{/register}">Register</a>
                    </p>

                    <hr>
                    <p class="small text-muted mb-1">Seeded demo accounts</p>
                    <ul class="small text-muted mb-0">
                        <li>admin / password</li>
                        <li>staff / password</li>
                        <li>customer / password</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
