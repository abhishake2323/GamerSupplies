spring.application.name=gamerSupplies
server.port=8080
spring.thymeleaf.cache=false

# H2 in-memory database (swap for PostgreSQL when ready)
spring.datasource.url=jdbc:h2:mem:gamersuppliesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#  PostgreSQL
# Create the database first: CREATE DATABASE gamersupplies;
# Update username and password to match your local setup
spring.datasource.url=jdbc:postgresql://localhost:5432/gamersupplies
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Runs data.sql after Hibernate builds the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Spring Data REST Base Path
spring.data.rest.base-path=/api