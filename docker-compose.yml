services:
  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    container_name: gamersupplies-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: gamersupplies
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Spring Boot Application ----
  app:
    build: .
    container_name: gamersupplies-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Datasource — points to the 'db' service on the Docker network
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/gamersupplies?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      # JPA / Hibernate
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      # Disable H2 console in Docker (not needed with MySQL)
      SPRING_H2_CONSOLE_ENABLED: "false"
      # Data initialization
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
